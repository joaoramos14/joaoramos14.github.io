<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>

    <a href="index.html">Home</a>

    <h1>Informações Pessoais</h1>

    <form action="index.html">

        <fieldset>

            <legend>Cadastro do Cliente</legend>

            <br>

            <div>
                <label for="">Nome:</label>
                <input type="text" size="50" maxlength="150" placeholder="Digite o nome do cliente">
            </div>

            <br>

            <div>
                <label for="">Idade:</label>
                <input type="number" size="50" maxlength="3" placeholder="Digite a idade">
            </div>

            <br>

            <div>
                <label for="">Endereço:</label>
                <br>
                <input type="text" size="50" placeholder="Digite o endereço">
            </div>

            <br>

            <div>
                <label for="">Cidade:</label>
                <input type="text" size="50" maxlength="150" placeholder="Digite a cidade">
            </div>

            <br>

            <div>
                <label for="">Estado:</label>
                <input type="text" size="1" maxlength="2" placeholder="UF">
            </div>

            <br>

            <div>
                <label for="">CEP:</label>
                <input type="number" size="0.5" maxlength="9" placeholder="XXXXX-XXX">
            </div>

            <br>

            <div>
                <label for="">Tel/Res:</label>
                <input type="number" size="0.5" maxlength="9" placeholder="99 99999-9999">
            </div>

            <br>

            <div>
                <label for="">Tel/Cel:</label>
                <input type="number" size="0.5" maxlength="9" placeholder="99 99999-9999">
            </div>

            <br>

            <div>
                <label for="">Email:</label>
                <br>
                <input type="text" size="50" placeholder="Digite o endereço de email">
            </div>

        </fieldset>

        <input type="submit" value="enviar">

    </form>

</body>

</html>
